---
# tasks file for sudo-pair

- name: Import assert.yml
  ansible.builtin.import_tasks: assert.yml
  run_once: true
  delegate_to: localhost

- name: Install requirements for cargo
  ansible.builtin.package:
    name: "{{ cargo_requirements }}"
    state: present

- name: Install curl if not already available
  ansible.builtin.package:
    name: curl
    state: present
  when: not (ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution'] != "Fedora" and ansible_facts['distribution_major_version'] | int >= 9)

- name: Download installer rustup
  ansible.builtin.get_url:
    url: https://static.rust-lang.org/rustup.sh
    dest: "{{ cargo_tmp }}/rustup.sh"
    mode: "750"
    validate_certs: false

- name: Run installer rustup
  ansible.builtin.command:
    cmd: "./rustup.sh -y"
    chdir: "{{ cargo_tmp }}"
    creates: "{{ cargo_prefix }}/bin/cargo"
  environment:
    CARGO_HOME: "{{ cargo_prefix }}"
    TMPDIR: "{{ cargo_tmp }}"
